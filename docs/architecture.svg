<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950" role="img" aria-labelledby="title desc">
  <title id="title">SWATCHING Backend Architecture</title>
  <desc id="desc">Architecture diagram for the SWATCHING Spring Boot backend, showing clients, security, domain modules, repositories, Google OAuth, JWT, Swagger, and MySQL RDS.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.5" stop-color="#f9faf7"/>
      <stop offset="1" stop-color="#fff8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#253247" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <style>
      .title { font: 800 34px Arial, sans-serif; fill: #162033; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #586174; }
      .section-title { font: 800 18px Arial, sans-serif; fill: #1d2939; }
      .label { font: 700 15px Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 12.5px Arial, sans-serif; fill: #536071; }
      .tiny { font: 500 11.5px Arial, sans-serif; fill: #687386; }
      .box { rx: 8; ry: 8; filter: url(#shadow); stroke-width: 1.3; }
      .group { rx: 8; ry: 8; fill: rgba(255,255,255,0.72); stroke: #d9e1ea; stroke-width: 1.4; }
      .line { fill: none; stroke: #4a5568; stroke-width: 2.2; marker-end: url(#arrow); }
      .soft-line { fill: none; stroke: #7b8798; stroke-width: 1.8; marker-end: url(#arrow); stroke-dasharray: 6 6; }
      .db-line { fill: none; stroke: #2f6f5e; stroke-width: 2.2; marker-end: url(#arrow); }
      .note { rx: 8; ry: 8; fill: #fffdf7; stroke: #ead7a5; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1400" height="950" fill="url(#bg)"/>

  <text x="70" y="70" class="title">SWATCHING Backend Architecture</text>
  <text x="72" y="100" class="subtitle">Spring Boot 3.5 / Java 17 / JPA / Spring Security OAuth2 / JWT / MySQL RDS</text>

  <rect x="60" y="135" width="250" height="190" class="group"/>
  <text x="85" y="170" class="section-title">External Clients</text>
  <rect x="88" y="195" width="194" height="45" class="box" fill="#e9f4ff" stroke="#8bbce8"/>
  <text x="112" y="223" class="label">Frontend / Browser</text>
  <rect x="88" y="258" width="194" height="45" class="box" fill="#ecfdf3" stroke="#8fd0aa"/>
  <text x="133" y="286" class="label">Swagger UI</text>

  <rect x="365" y="135" width="320" height="190" class="group"/>
  <text x="390" y="170" class="section-title">Auth Entry Points</text>
  <rect x="392" y="195" width="266" height="45" class="box" fill="#f1efff" stroke="#aca1e8"/>
  <text x="419" y="223" class="label">/oauth2/authorization/google</text>
  <rect x="392" y="258" width="266" height="45" class="box" fill="#fff1e8" stroke="#e6af84"/>
  <text x="427" y="286" class="label">/login/oauth2/code/google</text>

  <rect x="760" y="135" width="260" height="190" class="group"/>
  <text x="785" y="170" class="section-title">External Identity</text>
  <rect x="790" y="205" width="200" height="72" class="box" fill="#ffffff" stroke="#d3d9e2"/>
  <text x="843" y="235" class="label">Google OAuth</text>
  <text x="818" y="258" class="small">profile, email, sub</text>

  <rect x="1100" y="135" width="240" height="190" class="group"/>
  <text x="1125" y="170" class="section-title">Runtime Config</text>
  <rect x="1128" y="196" width="184" height="96" class="box" fill="#f8fbff" stroke="#c7d7e8"/>
  <text x="1164" y="224" class="label">application.yml</text>
  <text x="1152" y="248" class="small">DB_URL, JWT_SECRET</text>
  <text x="1151" y="269" class="small">GOOGLE_CLIENT_*</text>

  <rect x="60" y="380" width="1280" height="470" class="group"/>
  <text x="88" y="417" class="section-title">Spring Boot Application</text>
  <text x="88" y="440" class="small">com.swatching.swatching_be</text>

  <rect x="95" y="470" width="250" height="280" class="group"/>
  <text x="120" y="505" class="section-title">Global Layer</text>
  <rect x="122" y="530" width="196" height="48" class="box" fill="#eef6ff" stroke="#99c2e6"/>
  <text x="157" y="559" class="label">SecurityConfig</text>
  <rect x="122" y="592" width="196" height="48" class="box" fill="#eef6ff" stroke="#99c2e6"/>
  <text x="146" y="621" class="label">JwtAuthFilter</text>
  <rect x="122" y="654" width="196" height="48" class="box" fill="#eef6ff" stroke="#99c2e6"/>
  <text x="133" y="683" class="label">CurrentUserProvider</text>

  <rect x="390" y="470" width="270" height="280" class="group"/>
  <text x="415" y="505" class="section-title">API Controllers</text>
  <rect x="418" y="530" width="214" height="46" class="box" fill="#f2fff6" stroke="#98d5aa"/>
  <text x="465" y="558" class="label">BrandController</text>
  <rect x="418" y="588" width="214" height="46" class="box" fill="#f2fff6" stroke="#98d5aa"/>
  <text x="457" y="616" class="label">ArchiveController</text>
  <rect x="418" y="646" width="214" height="46" class="box" fill="#f2fff6" stroke="#98d5aa"/>
  <text x="450" y="674" class="label">CategoryController</text>
  <rect x="418" y="704" width="214" height="34" class="box" fill="#f2fff6" stroke="#98d5aa"/>
  <text x="470" y="727" class="label">User / SavedBrand / Keyword</text>

  <rect x="705" y="470" width="290" height="280" class="group"/>
  <text x="730" y="505" class="section-title">Domain Services</text>
  <rect x="733" y="530" width="234" height="45" class="box" fill="#fff8e8" stroke="#e8ca7b"/>
  <text x="782" y="558" class="label">BrandService</text>
  <rect x="733" y="587" width="234" height="45" class="box" fill="#fff8e8" stroke="#e8ca7b"/>
  <text x="774" y="615" class="label">ArchiveService</text>
  <rect x="733" y="644" width="234" height="45" class="box" fill="#fff8e8" stroke="#e8ca7b"/>
  <text x="767" y="672" class="label">CategoryService</text>
  <rect x="733" y="701" width="234" height="34" class="box" fill="#fff8e8" stroke="#e8ca7b"/>
  <text x="746" y="724" class="label">ManualBrand / Scoring / Keyword</text>

  <rect x="1040" y="470" width="260" height="280" class="group"/>
  <text x="1065" y="505" class="section-title">Repositories &amp; Entities</text>
  <rect x="1068" y="530" width="204" height="45" class="box" fill="#fff1f2" stroke="#e9a1aa"/>
  <text x="1113" y="558" class="label">Repositories</text>
  <rect x="1068" y="587" width="204" height="45" class="box" fill="#fff1f2" stroke="#e9a1aa"/>
  <text x="1109" y="615" class="label">JPA Entities</text>
  <text x="1085" y="665" class="small">User, Brand, Keyword</text>
  <text x="1085" y="687" class="small">Category, SavedBrand</text>
  <text x="1085" y="709" class="small">BrandImage, BrandKeyword</text>

  <rect x="515" y="790" width="360" height="42" class="note"/>
  <text x="540" y="816" class="small">Common response/error shape: ApiResponse, BusinessException, ErrorCode, GlobalExceptionHandler</text>

  <rect x="1050" y="805" width="250" height="82" class="box" fill="#e9fbf4" stroke="#7fc9ae"/>
  <text x="1115" y="837" class="section-title">MySQL RDS</text>
  <text x="1088" y="861" class="small">spring.datasource.url = DB_URL</text>

  <rect x="110" y="805" width="260" height="82" class="box" fill="#f7f4ff" stroke="#b8a8e8"/>
  <text x="163" y="837" class="section-title">JWT Session Flow</text>
  <text x="140" y="861" class="small">OAuth success -> JWT -> BearerAuth</text>

  <path class="line" d="M 282 218 C 320 218, 350 218, 390 218"/>
  <path class="soft-line" d="M 658 218 C 690 218, 730 218, 790 235"/>
  <path class="soft-line" d="M 790 255 C 730 280, 700 285, 658 282"/>
  <path class="line" d="M 185 303 C 185 360, 210 410, 220 530"/>
  <path class="line" d="M 525 303 C 510 360, 305 408, 220 530"/>
  <path class="line" d="M 318 555 C 350 555, 380 555, 418 555"/>
  <path class="line" d="M 632 612 C 668 612, 700 612, 733 612"/>
  <path class="line" d="M 967 612 C 1000 612, 1035 612, 1068 612"/>
  <path class="db-line" d="M 1170 632 C 1170 702, 1170 750, 1170 805"/>
  <path class="soft-line" d="M 1128 244 C 1005 310, 885 400, 850 530"/>
  <path class="soft-line" d="M 220 702 C 220 755, 230 780, 240 805"/>

  <text x="326" y="205" class="tiny">login request</text>
  <text x="686" y="205" class="tiny">authorize</text>
  <text x="684" y="304" class="tiny">callback</text>
  <text x="660" y="592" class="tiny">business logic</text>
  <text x="1000" y="592" class="tiny">data access</text>
  <text x="1187" y="760" class="tiny">JDBC</text>

  <rect x="60" y="880" width="1280" height="1" fill="#d6dde6"/>
  <text x="72" y="910" class="tiny">Generated from current project structure: controllers, services, repositories, security config, OAuth2 client settings, and datasource configuration.</text>
</svg>
