<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 처리 중...</title>
</head>
<body>
<p>로그인 처리 중입니다. 잠시만 기다려주세요...</p>
<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
        localStorage.setItem('authorized', JSON.stringify({
            "BearerAuth": {
                "name": "BearerAuth",
                "schema": {"type": "http", "scheme": "bearer", "bearerFormat": "JWT"},
                "value": token
            }
        }));
        window.location.replace('/swagger-ui/index.html');
    } else {
        document.body.innerHTML = '<p>토큰을 찾을 수 없습니다. 다시 로그인해주세요.</p>';
    }
</script>
</body>
</html>
