<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 처리 중...</title>
</head>
<body>
<p>로그인 처리 중입니다. 잠시만 기다려주세요...</p>
<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
        window.location.replace('http://localhost:5173/auth-callback?token=' + encodeURIComponent(token));
    } else {
        document.body.innerHTML = '<p>토큰을 찾을 수 없습니다. 다시 로그인해주세요.</p>';
    }
</script>
</body>
</html>
