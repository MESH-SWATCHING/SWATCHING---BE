<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 완료</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; max-width: 480px; width: 90%; }
    h2 { margin-top: 0; color: #333; }
    .token-box { background: #f0f0f0; border-radius: 8px; padding: 12px; word-break: break-all; font-size: 12px; color: #555; margin: 16px 0; text-align: left; }
    button { background: #4285f4; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 6px; }
    button:hover { background: #3367d6; }
    .success { color: #2e7d32; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
<div class="box">
  <h2>✅ 구글 로그인 성공</h2>
  <p>발급된 JWT 토큰:</p>
  <div class="token-box" id="tokenBox">토큰을 불러오는 중...</div>
  <button onclick="copyToken()">토큰 복사</button>
  <button onclick="goSwagger()">Swagger로 이동</button>
  <div class="success" id="copyMsg">복사 완료!</div>
  <p style="font-size:12px; color:#888; margin-top:20px;">
    Swagger에서 <b>Authorize</b> 버튼 클릭 후 토큰을 붙여넣으세요.
  </p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (token) {
    document.getElementById('tokenBox').textContent = token;
    sessionStorage.setItem('swagger_jwt', token);
  } else {
    document.getElementById('tokenBox').textContent = '토큰을 찾을 수 없습니다.';
  }

  function copyToken() {
    navigator.clipboard.writeText(token).then(() => {
      document.getElementById('copyMsg').style.display = 'block';
      setTimeout(() => document.getElementById('copyMsg').style.display = 'none', 2000);
    });
  }

  function goSwagger() {
    window.location.href = '/swagger-ui/index.html';
  }
</script>
</body>
</html>
