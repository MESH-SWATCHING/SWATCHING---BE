<!-- Tags Grid -->
<div class="flex flex-wrap gap-2 mb-4" id="chip-container"><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">빈티지</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">미니멀</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">스트릿</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">고프코어</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">테크웨어</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">클래식</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">페미닌</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">워크웨어</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">아메카지</button><button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-sm text-label-sm transition-colors duration-200 active:scale-95" onclick="toggleChip(this)">액세서리</button><script>function toggleChip(el) { const container = document.getElementById('chip-container'); const selected = container.querySelectorAll('.chip-active'); if (!el.classList.contains('chip-active') && selected.length >= 3) { el.style.animation = 'shake 0.2s ease-in-out'; setTimeout(() => el.style.animation = '', 200); return; } el.classList.toggle('chip-active'); }</script><style>@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }</style></div>
